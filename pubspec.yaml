name: navigo
description: NaviGo - One-tap navigation shortcuts for elderly users. Opens Google Maps directions directly.
publish_to: 'none'
version: 1.0.0+1

environment:
  sdk: '>=3.6.0 <4.0.0'
  flutter: '>=3.27.0'

dependencies:
  flutter:
    sdk: flutter

  # State management
  flutter_riverpod: ^2.6.1

  # Local storage
  hive_ce: ^2.7.0
  hive_ce_flutter: ^2.2.0

  # Routing
  go_router: ^14.8.0

  # Maps & location
  url_launcher: ^6.3.1
  geolocator: ^13.0.2

  # Notifications
  flutter_local_notifications: ^18.0.1
  timezone: ^0.9.4

  # Sharing
  share_plus: ^10.1.4

  # Home screen widget
  home_widget: ^0.7.0

  # Place search
  google_places_autocomplete_text_field: ^0.1.3
  http: ^1.2.2

  # Utilities
  uuid: ^4.5.1

dev_dependencies:
  flutter_test:
    sdk: flutter
  flutter_lints: ^5.0.0
  hive_ce_generator: ^1.7.0
  build_runner: ^2.4.14
  mocktail: ^1.0.4

flutter:
  uses-material-design: true
